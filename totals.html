<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>協賛金額集計</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- アイコン -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
  カラー
========================= */
:root{
 --main:#7a1f2b;
 --accent:#f4a62a;
}

/* =========================
  全体
========================= */
body{
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 margin:0;
 background:#f4f6f9;
}

.container{
 max-width:900px;
 margin:auto;
 padding:20px;
}

/* =========================
  タイトル
========================= */
h1{
 color:var(--main);
}

/* =========================
  ボタン
========================= */
button{
 padding:10px 15px;
 border:none;
 border-radius:8px;
 background:var(--main);
 color:white;
 cursor:pointer;
}

button:hover{
 background:#5c1620;
}

/* =========================
  カード
========================= */
.card{
 background:white;
 padding:20px;
 border-radius:12px;
 box-shadow:0 2px 8px rgba(0,0,0,0.08);
 margin-top:20px;
 border-left:6px solid var(--accent);
}

/* =========================
  テーブルラップ（重要）
========================= */
.table-wrap{
 width:100%;
 overflow-x:auto;
 -webkit-overflow-scrolling:touch;
}

/* =========================
  テーブル
========================= */
table{
 width:100%;
 border-collapse:collapse;
 min-width:400px; /* ←スマホ対策 */
}

th{
 background:var(--main);
 color:white;
 padding:10px;
}

td{
 padding:12px;
 border-bottom:1px solid #eee;
 text-align:center;
}

tr:hover{
 background:#f1f5ff;
}

.total{
 font-weight:bold;
 font-size:18px;
}

/* =========================
  スマホ
========================= */
@media (max-width:600px){

 th, td{
  font-size:14px;
  padding:8px;
 }

 button{
  width:100%;
 }

}

</style>
</head>

<body>

<div class="container">

<button onclick="location.href='index.html'">
 <i class="fa-solid fa-arrow-left"></i> 戻る
</button>

<h1>
 <i class="fa-solid fa-yen-sign"></i>
 年度別 協賛金額
</h1>

<div class="card">

<div class="table-wrap">

<table>
<thead>
<tr>
<th>年度</th>
<th>合計金額</th>
</tr>
</thead>

<tbody id="totalTable"></tbody>
</table>

</div>

</div>

</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if (!firebase.apps.length) {
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

/* =========================
  合計計算
========================= */
function loadTotals(){

 db.ref("companies").on("value", snapshot => {

  const all = snapshot.val() || {};
  let totals = {};

  Object.values(all).forEach(c=>{
   if(!c.years) return;

   Object.entries(c.years).forEach(([year,data])=>{

    const amount = Number(data.amount || 0);

    if(!totals[year]) totals[year] = 0;

    totals[year] += amount;

   });

  });

  const table = document.getElementById("totalTable");
  table.innerHTML = "";

  Object.keys(totals).sort().forEach(year=>{

   const tr = document.createElement("tr");

   const tdYear = document.createElement("td");
   tdYear.textContent = year;

   const tdAmount = document.createElement("td");
   tdAmount.textContent = totals[year].toLocaleString() + " 円";
   tdAmount.className = "total";

   tr.appendChild(tdYear);
   tr.appendChild(tdAmount);

   table.appendChild(tr);

  });

 });

}

loadTotals();

</script>

</body>
</html>
