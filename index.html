<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>協賛企業データベース</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;margin:40px;background:#f5f5f5;}

button{
 padding:10px;
 margin:5px;
 border:none;
 background:#2c7be5;
 color:white;
 border-radius:5px;
 cursor:pointer;
}
button:hover{background:#1a5dc9;}

ul{list-style:none;padding:0;}

li{
 background:white;
 padding:15px;
 margin-bottom:10px;
 border-radius:5px;
 cursor:pointer;
 box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.status{
 margin-left:10px;
 font-weight:bold;
 cursor:pointer;
}

.status-ok{color:green;}
.status-maybe{color:orange;}
.status-no{color:red;}
</style>
</head>

<body>

<div id="login">
<h2>ログイン</h2>
<input type="password" id="password">
<button onclick="login()">ログイン</button>
</div>

<div id="main" style="display:none">

<h1>協賛企業データベース</h1>

<input type="text" id="search" placeholder="検索">

<button onclick="addCompany()">＋追加</button>
<button onclick="exportCSV()">CSV</button>
<button onclick="location.href='totals.html'">協賛金額を見る</button>
 
<ul id="companyList"></ul>

</div>

<script>

let allCompanies = {};

// Firebase
const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if (!firebase.apps.length) {
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

// ログイン
function login(){
 const pass = document.getElementById("password").value;

 if(pass==="joie"){
  localStorage.setItem("loggedin","true");
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
  loadCompanies();
 }else{
  alert("パスワードが違います");
 }
}

// 自動ログイン
if(localStorage.getItem("loggedin")==="true"){
 document.getElementById("login").style.display="none";
 document.getElementById("main").style.display="block";
 loadCompanies();
}

// 読み込み
function loadCompanies(){
 db.ref("companies").on("value", snap=>{
  allCompanies = snap.val() || {};
  render();
 });
}

// 描画（修正版）
function render(filter=""){

const list = document.getElementById("companyList");
list.innerHTML="";

Object.values(allCompanies)
.filter(c=>c.name && c.name.includes(filter))
.forEach(c=>{

const li = document.createElement("li");

// years取得（無ければ2025作る）
let years = c.years || {"2025":""};

// 最新年度
const latestYear = Object.keys(years).sort().slice(-1)[0];

// 状態
const status = years[latestYear] || "";

// 色
let cls="";
if(status==="○") cls="status-ok";
if(status==="△") cls="status-maybe";
if(status==="×") cls="status-no";

// 表示
li.innerHTML = `
 ${c.name}
 <span class="status ${cls}" 
 onclick="changeStatusFromList('${c.id}','${latestYear}', event)">
  ${latestYear}:${status}
 </span>
`;

// 詳細ページ
li.onclick = ()=>{
 location.href="company.html?id="+c.id;
};

list.appendChild(li);

});

}

// 検索
document.getElementById("search").oninput = e=>{
render(e.target.value);
};

// 状態変更（完全修正版）
function changeStatusFromList(companyId, year, event){

event.stopPropagation();

db.ref("companies/"+companyId).once("value", snap=>{

const c = snap.val() || {};
let years = c.years || {};

// 年度が無い場合は作る
if(!year){
 year = "2025";
}

// yearsが空なら初期化
if(Object.keys(years).length === 0){
 years = {"2025":""};
}

// 現在値
const current = years[year] || "";

let next = "";

if(current==="") next="○";
else if(current==="○") next="△";
else if(current==="△") next="×";
else if(current==="×") next="";

// 保存
db.ref("companies/"+companyId+"/years/"+year).set(next);

});

}

// 追加（2025だけ）
function addCompany(){

const name = prompt("企業名");
if(!name) return;

const id = Date.now();

db.ref("companies/"+id).set({
 id:id,
 name:name,
 address:prompt("住所"),
 email:prompt("メール"),
 phone:prompt("電話"),
 map:prompt("GoogleMap URL"),
 notes:prompt("備考"),
 years:{
  "2025":""
 }
});

alert("追加OK");
}

// CSV
function exportCSV(){

let csv="企業名,住所,メール,電話\n";

Object.values(allCompanies).forEach(c=>{
csv += `"${c.name||""}","${c.address||""}","${c.email||""}","${c.phone||""}"\n`;
});

const blob = new Blob([csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="companies.csv";
a.click();

}

</script>

</body>
</html>
