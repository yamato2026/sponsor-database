<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>協賛企業データベース</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
font-family:sans-serif;
margin:40px;
}

button{
margin:5px;
}

#stats{
margin-top:10px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<div id="login">

<h2>ログイン</h2>

<input type="password" id="password" placeholder="パスワード">

<button onclick="login()">Log in</button>

</div>

<div id="main" style="display:none">

<h1>協賛企業データベース</h1>

<input type="text" id="search" placeholder="企業名検索">

<button onclick="showSponsors()">協賛あり企業</button>
<button onclick="showAll()">全企業</button>

<button onclick="addCompany()">＋企業追加</button>

<div id="stats"></div>

<button onclick="exportCSV()">CSVバックアップ</button>

<ul id="companyList"></ul>

</div>

<script>

function login(){

const pass=document.getElementById("password").value;

if(pass==="joie"){

location.href="index.html?auth=ok";

}else{

alert("パスワードが違います");

}

}

const params=new URLSearchParams(location.search);

if(params.get("auth")==="ok"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

loadCompanies();

}

</script>

</body>
</html>
