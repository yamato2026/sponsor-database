<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>協賛企業データベース</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

body{
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 margin:0;
 background:#f4f6f9;
}

.container{
 max-width:900px;
 margin:auto;
 padding:20px;
}

.card{
 background:white;
 padding:20px;
 border-radius:12px;
 box-shadow:0 2px 8px rgba(0,0,0,0.1);
 margin-top:20px;
}

input{
 width:100%;
 padding:10px;
 margin:10px 0;
 border:1px solid #ddd;
 border-radius:6px;
}

button{
 padding:10px;
 border:none;
 border-radius:6px;
 background:#7a1f2b;
 color:white;
 cursor:pointer;
 width:100%;
 margin-top:5px;
}

button:hover{
 background:#5c1620;
}

.logout{
 background:#555;
}

ul{
 list-style:none;
 padding:0;
}

li{
 background:white;
 padding:15px;
 margin-top:10px;
 border-radius:8px;
 cursor:pointer;
 box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="container">

<!-- ログイン -->
<div id="login" class="card">
<h2>ログイン / 新規登録</h2>

<input type="email" id="email" placeholder="学校メール（@stu.yamato-u.ac.jp）">
<input type="password" id="password" placeholder="パスワード">

<button onclick="login()">ログイン</button>
<button onclick="register()">新規登録</button>
</div>

<!-- メイン -->
<div id="main" style="display:none">

<h1>協賛企業データベース</h1>

<button class="logout" onclick="logout()">ログアウト</button>

<input type="text" id="search" placeholder="検索">

<button onclick="addCompany()">＋追加</button>

<ul id="companyList"></ul>

</div>

</div>

<script>

// Firebase設定
const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

let allCompanies = {};

// =========================
// メール制限
// =========================
function isSchoolMail(email){
 return email.endsWith("@stu.yamato-u.ac.jp");
}

// =========================
// 新規登録（→強制ログアウト）
// =========================
function register(){

 const email = document.getElementById("email").value.trim();
 const pass = document.getElementById("password").value;

 if(!isSchoolMail(email)){
  alert("学校メールのみ登録できます");
  return;
 }

 auth.createUserWithEmailAndPassword(email, pass)
 .then(()=>{
  alert("登録完了！ログインしてください");

  // ★ここが今回のポイント
  auth.signOut();

 })
 .catch(e=>{
  alert(e.message);
 });

}

// =========================
// ログイン
// =========================
function login(){

 const email = document.getElementById("email").value.trim();
 const pass = document.getElementById("password").value;

 if(!isSchoolMail(email)){
  alert("学校メールのみログインできます");
  return;
 }

 auth.signInWithEmailAndPassword(email, pass)
 .catch(()=>{
  alert("ログイン失敗");
 });

}

// =========================
// ログアウト
// =========================
function logout(){
 auth.signOut();
}

// =========================
// ログイン状態監視
// =========================
auth.onAuthStateChanged(user => {

 if(user){
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
  loadCompanies();
 }else{
  document.getElementById("login").style.display="block";
  document.getElementById("main").style.display="none";
 }

});

// =========================
// 企業読み込み
// =========================
function loadCompanies(){

 db.ref("companies").on("value", snap=>{
  allCompanies = snap.val() || {};
  render();
 });

}

// =========================
// 表示
// =========================
function render(filter=""){

 const list = document.getElementById("companyList");
 list.innerHTML="";

 Object.values(allCompanies)
 .filter(c=>c.name && c.name.includes(filter))
 .forEach(c=>{

  const li=document.createElement("li");

  li.textContent = c.name;

  li.onclick=()=>{
   location.href="company.html?id="+c.id;
  };

  list.appendChild(li);

 });

}

// =========================
// 検索
// =========================
document.getElementById("search").oninput = e=>{
 render(e.target.value);
};

// =========================
// 企業追加
// =========================
function addCompany(){

 const name = prompt("企業名");
 if(!name) return;

 const id = Date.now();

 db.ref("companies/"+id).set({
  id:id,
  name:name,
  address:prompt("住所"),
  email:prompt("メール"),
  phone:prompt("電話"),
  map:prompt("GoogleMap URL"),
  notes:prompt("備考"),
  years:{
   "2025":{
    status:"",
    amount:0,
    notes:""
   }
  }
 });

 alert("追加OK");

}

</script>

</body>
</html>
