<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>協賛企業データベース</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{font-family:sans-serif;margin:0;background:#f4f6f9;}
.container{max-width:900px;margin:auto;padding:20px;}
.card{background:white;padding:20px;border-radius:12px;margin-top:20px;}
input{width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:6px;}
button{padding:10px;border:none;border-radius:6px;background:#7a1f2b;color:white;cursor:pointer;width:100%;margin-top:5px;}
.logout{background:#555;}
li{background:white;padding:15px;margin-top:10px;border-radius:8px;cursor:pointer;}
</style>
</head>

<body>

<div class="container">

<div id="login" class="card">
<h2>ログイン / 新規登録</h2>
<input type="email" id="email" placeholder="学校メール">
<input type="password" id="password" placeholder="パスワード">
<button onclick="login()">ログイン</button>
<button onclick="register()">新規登録</button>
</div>

<div id="main" style="display:none">
<h1>協賛企業データベース</h1>

<button class="logout" onclick="logout()">ログアウト</button>
<button onclick="location.href='totals.html'">年度合計を見る</button>

<input type="text" id="search" placeholder="検索">
<button onclick="addCompany()">＋追加</button>

<ul id="companyList"></ul>
</div>

</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

let allCompanies = {};

// メール制限
function isSchoolMail(email){
 return email.endsWith("@stu.yamato-u.ac.jp");
}

// 登録
function register(){

 const email = document.getElementById("email").value.trim();
 const pass = document.getElementById("password").value;

 if(!isSchoolMail(email)){
  alert("学校メールのみ");
  return;
 }

 auth.createUserWithEmailAndPassword(email, pass)
 .then(()=>{
  alert("登録完了 → ログインしてください");
  auth.signOut();
 })
 .catch(e=>{
  alert("登録エラー: " + e.message);
  console.log(e);
 });

}

// ログイン（★エラー表示強化）
function login(){

 const email = document.getElementById("email").value.trim();
 const pass = document.getElementById("password").value;

 if(!isSchoolMail(email)){
  alert("学校メールのみログインできます");
  return;
 }

 auth.signInWithEmailAndPassword(email, pass)
 .then(()=>{
  alert("ログイン成功");
 })
 .catch(e=>{
  alert("ログインエラー: " + e.message);
  console.log(e);
 });

}

// ログアウト
function logout(){
 auth.signOut();
}

// 状態監視
auth.onAuthStateChanged(user=>{
 if(user){
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
  load();
 }else{
  document.getElementById("login").style.display="block";
  document.getElementById("main").style.display="none";
 }
});

// データ読み込み
function load(){
 db.ref("companies").on("value", snap=>{
  allCompanies = snap.val() || {};
  render();
 });
}

// 表示（最新年度＋合計）
function render(filter=""){

 const list = document.getElementById("companyList");
 list.innerHTML="";

 Object.values(allCompanies)
 .filter(c=>c.name && c.name.includes(filter))
 .forEach(c=>{

  const years = c.years || {};
  const keys = Object.keys(years).sort().reverse();
  const latestYear = keys[0];

  let total = 0;
  let status = "";

  keys.forEach(y=>{
   total += Number(years[y]?.amount || 0);
  });

  if(latestYear){
   status = years[latestYear]?.status || "";
  }

  const li=document.createElement("li");

  li.innerHTML = `
   <div style="display:flex;justify-content:space-between;">
    <div>
     <div style="font-weight:bold;">${c.name}</div>
     <div style="font-size:13px;color:#666;">
      合計：${total.toLocaleString()}円
     </div>
    </div>
    <div style="font-weight:bold;">
     ${latestYear || ""}：${status}
    </div>
   </div>
  `;

  li.onclick=()=>{
   location.href="company.html?id="+c.id;
  };

  list.appendChild(li);

 });

}

// 検索
document.getElementById("search").oninput=e=>{
 render(e.target.value);
};

// 追加
function addCompany(){

 const name = prompt("企業名");
 if(!name) return;

 const id = Date.now();

 db.ref("companies/"+id).set({
  id:id,
  name:name,
  years:{
   "2025":{
    status:"",
    amount:0,
    notes:""
   }
  }
 });

}

</script>

</body>
</html>
