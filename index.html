<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年度別 合計金額</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

body{
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 margin:0;
 background:#f4f6f9;
}

.container{
 max-width:900px;
 margin:auto;
 padding:20px;
}

.card{
 background:white;
 padding:20px;
 border-radius:12px;
 box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
 margin-top:0;
}

button{
 padding:10px;
 border:none;
 border-radius:6px;
 background:#7a1f2b;
 color:white;
 cursor:pointer;
 margin-bottom:10px;
}

.table-wrap{
 overflow-x:auto;
}

table{
 width:100%;
 border-collapse:collapse;
 min-width:400px;
}

th{
 background:#7a1f2b;
 color:white;
 padding:10px;
}

td{
 padding:10px;
 border-bottom:1px solid #eee;
 text-align:center;
}

.total{
 font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<button onclick="location.href='index.html'">← 戻る</button>

<div class="card">
<h1>年度別 合計金額</h1>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>年度</th>
<th>合計金額</th>
</tr>
</thead>
<tbody id="totalTable"></tbody>
</table>
</div>

</div>

</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

// =========================
// ログインチェック（未ログインなら戻す）
// =========================
auth.onAuthStateChanged(user=>{
 if(!user){
  location.href="index.html";
 }else{
  loadTotals();
 }
});

// =========================
// 合計計算
// =========================
function loadTotals(){

 db.ref("companies").on("value", snap=>{

  const companies = snap.val() || {};
  let totals = {};

  Object.values(companies).forEach(c=>{
   if(!c.years) return;

   Object.entries(c.years).forEach(([year,data])=>{
    const amount = Number(data.amount || 0);
    if(!totals[year]) totals[year]=0;
    totals[year]+=amount;
   });
  });

  render(totals);

 });

}

// =========================
// 表示
// =========================
function render(totals){

 const table = document.getElementById("totalTable");
 table.innerHTML="";

 Object.keys(totals).sort().forEach(year=>{

  const tr=document.createElement("tr");

  const tdYear=document.createElement("td");
  tdYear.textContent=year;

  const tdAmount=document.createElement("td");
  tdAmount.textContent=totals[year].toLocaleString()+"円";
  tdAmount.className="total";

  tr.appendChild(tdYear);
  tr.appendChild(tdAmount);

  table.appendChild(tr);

 });

}

</script>

</body>
</html>
