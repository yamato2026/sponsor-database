<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
font-family:sans-serif;
margin:40px;
}

table{
border-collapse:collapse;
margin-top:20px;
width:600px;
}

td,th{
border:1px solid black;
padding:10px;
text-align:center;
}

input{
width:100%;
}

button{
margin:3px;
}
</style>

</head>

<body>

<h1 id="name"></h1>

<button onclick="editCompany()">企業編集</button>
<button onclick="deleteCompany()">削除</button>

<p><b>メール：</b><span id="email"></span></p>
<p><b>電話：</b><span id="phone"></span></p>

<a id="maplink" target="_blank">
<img id="map" width="300">
</a>

<h2>協賛履歴</h2>

<table>

<tr>
<th>年度</th>
<th>状況</th>
<th>備考</th>
</tr>

<tr>
<td>2025</td>
<td>
<select id="s2025">
<option value="">未訪問</option>
<option value="◎">◎ 協賛</option>
<option value="○">○ パンフレットのみ</option>
<option value="△">△ 検討</option>
<option value="×">× 断り</option>
</select>
</td>
<td>
<input id="n2025" placeholder="備考">
</td>
</tr>

<tr>
<td>2026</td>
<td>
<select id="s2026">
<option value="">未訪問</option>
<option value="○">○ 協賛</option>
<option value="△">△ 検討</option>
<option value="×">× 断り</option>
</select>
</td>
<td>
<input id="n2026" placeholder="備考">
</td>
</tr>

<tr>
<td>2027</td>
<td>
<select id="s2027">
<option value="">未訪問</option>
<option value="○">○ 協賛</option>
<option value="△">△ 検討</option>
<option value="×">× 断り</option>
</select>
</td>
<td>
<input id="n2027" placeholder="備考">
</td>
</tr>

</table>

<br>

<button onclick="saveYears()">保存</button>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
authDomain: "teienn-kyousan.firebaseapp.com",
databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "teienn-kyousan",
storageBucket: "teienn-kyousan.firebasestorage.app",
messagingSenderId: "567202456256",
appId: "1:567202456256:web:156b0587040cbbfaa1c325"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params=new URLSearchParams(location.search);
const id=params.get("id");

db.ref("companies/"+id).on("value", snapshot => {

const company=snapshot.val();

if(!company){
alert("企業データが見つかりません");
location.href="index.html";
return;
}

document.getElementById("name").textContent=company.name;
document.getElementById("email").textContent=company.email;
document.getElementById("phone").textContent=company.phone;

if(company.map){
document.getElementById("map").src=company.map;
document.getElementById("maplink").href=company.map;
}

const years=company.years||{};

["2025","2026","2027"].forEach(y=>{

if(years[y]){

document.getElementById("s"+y).value=years[y].status||"";
document.getElementById("n"+y).value=years[y].note||"";

}

});

});

function saveYears(){

const data={};

["2025","2026","2027"].forEach(y=>{

data[y]={
status:document.getElementById("s"+y).value,
note:document.getElementById("n"+y).value
};

});

db.ref("companies/"+id+"/years").set(data);

alert("保存しました");

}

function editCompany(){

const name = prompt("企業名", document.getElementById("name").textContent);
const email = prompt("メール", document.getElementById("email").textContent);
const phone = prompt("電話", document.getElementById("phone").textContent);
const map = prompt("GoogleMap URL", document.getElementById("maplink").href);

db.ref("companies/"+id).update({
name:name,
email:email,
phone:phone,
map:map
});

alert("更新しました");

}

function deleteCompany(){

if(!confirm("この企業を削除しますか？")) return;

db.ref("companies/"+id).remove();

alert("削除しました");

location.href="index.html";

}

</script>

</body>
</html>
