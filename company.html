<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;margin:40px;}
button{padding:10px;margin:5px;border:none;background:#2c7be5;color:white;border-radius:5px;}
button:hover{background:#1a5dc9;}
.delete-btn{background:red;}
.status-ok{color:green;font-weight:bold;}
.status-maybe{color:orange;font-weight:bold;}
.status-no{color:red;font-weight:bold;}

table{border-collapse:collapse;margin-top:20px;}
td,th{border:1px solid #333;padding:10px;text-align:center;}

input{width:80px;padding:5px;}
.small-btn{background:red;color:white;padding:5px 8px;}
</style>

</head>

<body>

<button onclick="location.href='index.html'">←戻る</button>
<button onclick="editCompany()">編集</button>
<button onclick="deleteCompany()" class="delete-btn">削除</button>
<button onclick="addYear()">年度追加</button>

<h1 id="name"></h1>

<p><b>住所：</b><span id="address"></span></p>
<p><b>メール：</b><span id="email"></span></p>
<p><b>電話：</b><span id="phone"></span></p>

<p><b>地図：</b><a id="maplink" target="_blank">開く</a></p>

<h2>協賛履歴</h2>

<table>
<thead>
<tr>
<th>年度</th>
<th>状況</th>
<th>金額</th>
<th>削除</th>
</tr>
</thead>
<tbody id="yearTable"></tbody>
</table>

<h2>備考</h2>
<p id="notes"></p>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if(!firebase.apps.length){
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const id = new URLSearchParams(location.search).get("id");

// =========================
// 表示
// =========================
function load(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();

  if(!c){
   alert("データなし");
   return;
  }

  // 基本情報
  document.getElementById("name").textContent = c.name || "";
  document.getElementById("address").textContent = c.address || "";
  document.getElementById("email").textContent = c.email || "";
  document.getElementById("phone").textContent = c.phone || "";

  // ★備考（確実表示）
  document.getElementById("notes").textContent = c.notes || "";

  // ★マップ（安全処理）
  const map = c.map || "";
  document.getElementById("maplink").href =
   map.startsWith("http") ? map : "#";

  // 年度
  let years = c.years || {};

  if(Object.keys(years).length === 0){
   years = {"2025":{status:"",amount:0}};
   db.ref("companies/"+id+"/years").set(years);
  }

  const table = document.getElementById("yearTable");
  table.innerHTML = "";

  Object.keys(years).sort().forEach(y=>{

   const d = years[y] || {status:"",amount:0};

   const tr = document.createElement("tr");

   // 年度
   const tdYear = document.createElement("td");
   tdYear.textContent = y;

   // 状態
   const tdStatus = document.createElement("td");
   tdStatus.textContent = d.status || "";
   tdStatus.onclick = ()=>changeStatus(y);

   if(d.status==="○") tdStatus.className="status-ok";
   if(d.status==="△") tdStatus.className="status-maybe";
   if(d.status==="×") tdStatus.className="status-no";

   // 金額
   const tdAmount = document.createElement("td");
   const input = document.createElement("input");
   input.type = "number";
   input.value = d.amount || 0;

   input.onchange = ()=>{
    db.ref("companies/"+id+"/years/"+y+"/amount")
    .set(Number(input.value));
   };

   tdAmount.appendChild(input);

   // 削除
   const tdDelete = document.createElement("td");
   const btn = document.createElement("button");
   btn.textContent = "削除";
   btn.className = "small-btn";

   btn.onclick = (e)=>{
    e.stopPropagation();
    deleteYear(y);
   };

   tdDelete.appendChild(btn);

   tr.appendChild(tdYear);
   tr.appendChild(tdStatus);
   tr.appendChild(tdAmount);
   tr.appendChild(tdDelete);

   table.appendChild(tr);

  });

 });

}

// =========================
// 状態変更
// =========================
function changeStatus(year){

 db.ref("companies/"+id+"/years/"+year).once("value", snap=>{

  const d = snap.val() || {};
  const now = d.status || "";

  let next = "";
  if(now==="") next="○";
  else if(now==="○") next="△";
  else if(now==="△") next="×";
  else next="";

  db.ref("companies/"+id+"/years/"+year+"/status").set(next);

  load();

 });

}

// =========================
// 年度追加
// =========================
function addYear(){

 const y = prompt("年度（例：2030）");
 if(!y) return;

 db.ref("companies/"+id+"/years/"+y).set({
  status:"",
  amount:0
 });

 load();
}

// =========================
// 年度削除
// =========================
function deleteYear(y){

 if(!confirm(y+"年削除する？")) return;

 db.ref("companies/"+id+"/years/"+y).remove()
 .then(()=>load());
}

// =========================
// 編集
// =========================
function editCompany(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();
  if(!c) return;

  const name = prompt("企業名", c.name || "");
  if(name===null) return;

  const address = prompt("住所", c.address || "");
  if(address===null) return;

  const email = prompt("メール", c.email || "");
  if(email===null) return;

  const phone = prompt("電話", c.phone || "");
  if(phone===null) return;

  const map = prompt("GoogleMap URL", c.map || "");
  if(map===null) return;

  const notes = prompt("備考", c.notes || "");
  if(notes===null) return;

  db.ref("companies/"+id).update({
   name,address,email,phone,map,notes
  });

  load();

 });

}

// =========================
// 削除
// =========================
function deleteCompany(){

 if(!confirm("削除する？")) return;

 db.ref("companies/"+id).remove()
 .then(()=>{
  location.href="index.html";
 });

}

load();

</script>

</body>
</html>
