<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>協賛企業データベース</title>

<link rel="stylesheet" href="data/style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

body{
font-family:sans-serif;
margin:40px;
}

button{
margin:5px;
}

#stats{
margin-top:10px;
font-size:18px;
}

</style>

</head>

<body>

<div id="login">

<h2>ログイン</h2>

<input type="password" id="password" placeholder="パスワード">

<button onclick="login()">Log in</button>

</div>

<div id="main" style="display:none">

<h1>協賛企業データベース</h1>

<input type="text" id="search" placeholder="企業名検索">

<br><br>

<button onclick="showAll()">全部</button>
<button onclick="showUnvisited()">未訪問</button>
<button onclick="showSupport()">協賛</button>
<button onclick="showMaybe()">検討</button>

<button onclick="addCompany()">＋企業追加</button>

<div id="stats"></div>

<ul id="companyList"></ul>

</div>

<script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
authDomain: "teienn-kyousan.firebaseapp.com",
databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "teienn-kyousan",
storageBucket: "teienn-kyousan.firebasestorage.app",
messagingSenderId: "567202456256",
appId: "1:567202456256:web:156b0587040cbbfaa1c325"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params=new URLSearchParams(location.search);
const id=params.get("id");

db.ref("companies/"+id).once("value",snapshot=>{

const company=snapshot.val();

document.getElementById("name").textContent=company.name;
document.getElementById("address").textContent=company.address||"";
document.getElementById("email").textContent=company.email||"";
document.getElementById("phone").textContent=company.phone||"";
document.getElementById("map").src=company.map||"";
document.getElementById("maplink").href=company.map||"";

document.getElementById("notes").textContent=company.notes||"";

const years=company.years||{};

for(const year in years){

const status=years[year];
const cell=document.getElementById("y"+year);

if(!cell) continue;

cell.textContent=status;

if(status==="○") cell.className="status-ok";
if(status==="△") cell.className="status-maybe";
if(status==="×") cell.className="status-no";

}

});

</script>
</script>

</body>
</html>
