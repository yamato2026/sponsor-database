<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>協賛企業データベース</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
 font-family:sans-serif;
 margin:40px;
 background:#f5f5f5;
}

button{
 padding:10px;
 margin:5px;
 border:none;
 background:#2c7be5;
 color:white;
 border-radius:5px;
 cursor:pointer;
}
button:hover{background:#1a5dc9;}

input{
 padding:10px;
 width:100%;
 max-width:400px;
 margin-bottom:10px;
}

ul{list-style:none;padding:0;}

li{
 background:white;
 padding:15px;
 margin-bottom:10px;
 border-radius:5px;
 cursor:pointer;
 box-shadow:0 2px 5px rgba(0,0,0,0.1);
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.status-ok{color:green;font-weight:bold;}
.status-maybe{color:orange;font-weight:bold;}
.status-no{color:red;font-weight:bold;}

.status{
 font-weight:bold;
 margin-left:10px;
}
</style>
</head>

<body>

<div id="login">
<h2>ログイン</h2>
<input type="password" id="password">
<button onclick="login()">ログイン</button>
</div>

<div id="main" style="display:none">

<h1>協賛企業データベース</h1>

<input type="text" id="search" placeholder="検索">

<button onclick="addCompany()">＋追加</button>
<button onclick="exportCSV()">CSV</button>
<button onclick="location.href='totals.html'">協賛金額</button>

<ul id="companyList"></ul>

</div>

<script>

let allCompanies = {};

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if (!firebase.apps.length) {
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

// =========================
// ログイン
// =========================
function login(){
 const pass = document.getElementById("password").value;

 if(pass==="joie"){
  localStorage.setItem("loggedin","true");
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
  loadCompanies();
 }else{
  alert("パスワードが違います");
 }
}

if(localStorage.getItem("loggedin")==="true"){
 document.getElementById("login").style.display="none";
 document.getElementById("main").style.display="block";
 loadCompanies();
}

// =========================
// 読み込み
// =========================
function loadCompanies(){
 db.ref("companies").on("value", snap=>{
  allCompanies = snap.val() || {};
  render();
 });
}

// =========================
// 表示
// =========================
function render(filter=""){

const list = document.getElementById("companyList");
list.innerHTML="";

Object.values(allCompanies)
.filter(c=>c.name && c.name.includes(filter))
.forEach(c=>{

const li = document.createElement("li");

// 年度
let years = c.years || {};
const latestYear = Object.keys(years).sort().slice(-1)[0];

const status = latestYear ? years[latestYear] : "";

// 色
let cls = "";
if(status==="○") cls="status-ok";
if(status==="△") cls="status-maybe";
if(status==="×") cls="status-no";

// 表示（クリックなし・完全表示専用）
li.innerHTML = `
 <span>${c.name}</span>
 <span class="status ${cls}">
  ${latestYear ? latestYear + ":" + (status || "未") : "未登録"}
 </span>
`;

// 詳細へ
li.onclick = ()=>{
 location.href="company.html?id="+c.id;
};

list.appendChild(li);

});

}

// =========================
// 検索
// =========================
document.getElementById("search").oninput = e=>{
render(e.target.value);
};

// =========================
// 追加
// =========================
function addCompany(){

const name = prompt("企業名");
if(!name) return;

const id = Date.now();

db.ref("companies/"+id).set({
 id:id,
 name:name,
 address:prompt("住所"),
 email:prompt("メール"),
 phone:prompt("電話"),
 map:prompt("GoogleMap URL"),
 notes:prompt("備考"),
 years:{
  "2025":""
 }
});

alert("追加完了");
}

// =========================
// CSV
// =========================
function exportCSV(){

let csv="企業名,住所,メール,電話\n";

Object.values(allCompanies).forEach(c=>{
csv += `"${c.name||""}","${c.address||""}","${c.email||""}","${c.phone||""}"\n`;
});

const blob = new Blob([csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="companies.csv";
a.click();

}

</script>

</body>
</html>
