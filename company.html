<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;margin:40px;}

button{
 padding:10px;
 margin:5px;
 border:none;
 background:#2c7be5;
 color:white;
 border-radius:5px;
}

button:hover{background:#1a5dc9;}
.delete-btn{background:red;}

.status-ok{color:green;font-weight:bold;}
.status-maybe{color:orange;font-weight:bold;}
.status-no{color:red;font-weight:bold;}

table{
 border-collapse:collapse;
 margin-top:20px;
 width:100%;
}

td,th{
 border:1px solid #333;
 padding:10px;
 text-align:center;
}

input{
 width:100%;
 padding:5px;
 box-sizing:border-box;
}

/* ロック時の見た目 */
.locked input{
 pointer-events:none;
 background:#eee;
}

/* 備考横スクロール */
.note-scroll{
 max-width:300px;
 overflow-x:auto;
 white-space:nowrap;
 border:1px solid #ddd;
 padding:5px;
 background:#fff;
}

.small-btn{
 background:red;
 color:white;
 padding:5px 8px;
 border:none;
 border-radius:4px;
 cursor:pointer;
}
</style>

</head>

<body>

<button onclick="location.href='index.html'">←戻る</button>
<button onclick="toggleEdit()" id="editBtn">編集</button>
<button onclick="deleteCompany()" class="delete-btn">削除</button>
<button onclick="addYear()">年度追加</button>

<h1 id="name"></h1>

<p><b>住所：</b><span id="address"></span></p>
<p><b>メール：</b><span id="email"></span></p>
<p><b>電話：</b><span id="phone"></span></p>

<p><b>地図：</b><a id="maplink" target="_blank">開く</a></p>

<h2>協賛履歴</h2>

<table>
<thead>
<tr>
<th>年度</th>
<th>状況</th>
<th>金額</th>
<th>備考</th>
<th>削除</th>
</tr>
</thead>

<tbody id="yearTable"></tbody>
</table>

<h2>備考（企業全体）</h2>
<p id="notes"></p>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if(!firebase.apps.length){
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const id = new URLSearchParams(location.search).get("id");

let isEdit = false;
let inputs = [];

// =========================
// 表示
// =========================
function load(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();

  document.getElementById("name").textContent = c.name || "";
  document.getElementById("address").textContent = c.address || "";
  document.getElementById("email").textContent = c.email || "";
  document.getElementById("phone").textContent = c.phone || "";
  document.getElementById("notes").textContent = c.notes || "";

  const map = c.map || "";
  document.getElementById("maplink").href =
   map.startsWith("http") ? map : "#";

  let years = c.years || {};

  const table = document.getElementById("yearTable");
  table.innerHTML = "";
  inputs = [];

  Object.keys(years).sort().forEach(y=>{

   const d = years[y] || {status:"",amount:0,notes:""};

   const tr = document.createElement("tr");

   // 年度
   const tdYear = document.createElement("td");
   tdYear.textContent = y;

   // 状態
   const tdStatus = document.createElement("td");
   tdStatus.textContent = d.status || "";
   tdStatus.onclick = ()=>changeStatus(y);

   if(d.status==="○") tdStatus.className="status-ok";
   if(d.status==="△") tdStatus.className="status-maybe";
   if(d.status==="×") tdStatus.className="status-no";

   // 金額
   const tdAmount = document.createElement("td");
   const inputAmount = document.createElement("input");
   inputAmount.type = "number";
   inputAmount.value = d.amount || 0;
   inputAmount.dataset.path = "amount";

   tdAmount.appendChild(inputAmount);

   // 備考
   const tdNotes = document.createElement("td");

   const wrapper = document.createElement("div");
   wrapper.className = "note-scroll";

   const inputNotes = document.createElement("input");
   inputNotes.type = "text";
   inputNotes.value = d.notes || "";
   inputNotes.style.minWidth = "300px";
   inputNotes.dataset.path = "notes";

   wrapper.appendChild(inputNotes);
   tdNotes.appendChild(wrapper);

   inputs.push({year:y, amount:inputAmount, notes:inputNotes});

   // 削除
   const tdDelete = document.createElement("td");
   const btn = document.createElement("button");
   btn.textContent = "削除";
   btn.className = "small-btn";

   btn.onclick = (e)=>{
    e.stopPropagation();
    deleteYear(y);
   };

   tdDelete.appendChild(btn);

   tr.appendChild(tdYear);
   tr.appendChild(tdStatus);
   tr.appendChild(tdAmount);
   tr.appendChild(tdNotes);
   tr.appendChild(tdDelete);

   table.appendChild(tr);

  });

  applyLock();

 });

}

// =========================
// 編集ON/OFF
// =========================
function toggleEdit(){

 isEdit = !isEdit;

 if(!isEdit){
  saveAll();
 }

 applyLock();

 document.getElementById("editBtn").textContent =
 isEdit ? "保存" : "編集";
}

// ロック切替
function applyLock(){

 inputs.forEach(obj=>{
  obj.amount.disabled = !isEdit;
  obj.notes.disabled = !isEdit;
 });

 document.getElementById("yearTable")
 .classList.toggle("locked", !isEdit);
}

// =========================
// 一括保存
// =========================
function saveAll(){

 inputs.forEach(obj=>{

  db.ref("companies/"+id+"/years/"+obj.year).update({
   amount:Number(obj.amount.value),
   notes:obj.notes.value
  });

 });

}

// =========================
// 状態変更
// =========================
function changeStatus(year){

 db.ref("companies/"+id+"/years/"+year).once("value", snap=>{

  const d = snap.val() || {};
  const now = d.status || "";

  let next = "";
  if(now==="") next="○";
  else if(now==="○") next="△";
  else if(now==="△") next="×";
  else next="";

  db.ref("companies/"+id+"/years/"+year+"/status").set(next);

  load();

 });

}

// =========================
// 年度追加
// =========================
function addYear(){

 const y = prompt("年度");
 if(!y) return;

 db.ref("companies/"+id+"/years/"+y).set({
  status:"",
  amount:0,
  notes:""
 });

 load();
}

// =========================
// 削除
// =========================
function deleteYear(y){

 if(!confirm("削除？")) return;

 db.ref("companies/"+id+"/years/"+y).remove()
 .then(()=>load());
}

// =========================
// 削除企業
// =========================
function deleteCompany(){

 if(!confirm("削除する？")) return;

 db.ref("companies/"+id).remove()
 .then(()=>{
  location.href="index.html";
 });

}

load();

</script>

</body>
</html>
