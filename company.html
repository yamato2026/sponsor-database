<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;margin:40px;}

button{
 padding:10px;
 margin:5px;
 border:none;
 background:#2c7be5;
 color:white;
 border-radius:5px;
}

button:hover{background:#1a5dc9;}
.delete-btn{background:red;}

.status-ok{color:green;font-weight:bold;}
.status-maybe{color:orange;font-weight:bold;}
.status-no{color:red;font-weight:bold;}

table{
 border-collapse:collapse;
 margin-top:20px;
 width:100%;
}

td,th{
 border:1px solid #333;
 padding:10px;
 text-align:center;
}

input{
 width:100%;
 padding:5px;
 box-sizing:border-box;
}

.note-scroll{
 max-width:300px;
 overflow-x:auto;
 white-space:nowrap;
 border:1px solid #ddd;
 padding:5px;
 background:#fff;
}

.locked{
 background:#f5f5f5;
 cursor:pointer;
}

.small-btn{
 background:red;
 color:white;
 padding:5px 8px;
 border:none;
 border-radius:4px;
 cursor:pointer;
}
</style>

</head>

<body>

<button onclick="location.href='index.html'">←戻る</button>
<button onclick="editCompany()">編集</button>
<button onclick="deleteCompany()" class="delete-btn">削除</button>
<button onclick="addYear()">年度追加</button>

<h1 id="name"></h1>

<p><b>住所：</b><span id="address"></span></p>
<p><b>メール：</b><span id="email"></span></p>
<p><b>電話：</b><span id="phone"></span></p>

<p><b>地図：</b><a id="maplink" target="_blank">開く</a></p>

<h2>協賛履歴</h2>

<table>
<thead>
<tr>
<th>年度</th>
<th>状況</th>
<th>金額</th>
<th>備考</th>
<th>削除</th>
</tr>
</thead>

<tbody id="yearTable"></tbody>
</table>

<h2>備考（企業全体）</h2>
<p id="notes"></p>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if(!firebase.apps.length){
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const id = new URLSearchParams(location.search).get("id");

// =========================
// 読み込み
// =========================
function load(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();
  if(!c) return;

  document.getElementById("name").textContent = c.name || "";
  document.getElementById("address").textContent = c.address || "";
  document.getElementById("email").textContent = c.email || "";
  document.getElementById("phone").textContent = c.phone || "";
  document.getElementById("notes").textContent = c.notes || "";

  const map = c.map || "";
  document.getElementById("maplink").href =
   map.startsWith("http") ? map : "#";

  let years = c.years || {};

  const table = document.getElementById("yearTable");
  table.innerHTML = "";

  Object.keys(years).sort().forEach(y=>{

   const d = years[y] || {status:"",amount:0,notes:""};

   const tr = document.createElement("tr");

   // 年度
   const tdYear = document.createElement("td");
   tdYear.textContent = y;

   // 状態
   const tdStatus = document.createElement("td");
   tdStatus.textContent = d.status || "";
   tdStatus.onclick = ()=>changeStatus(y);

   if(d.status==="○") tdStatus.className="status-ok";
   if(d.status==="△") tdStatus.className="status-maybe";
   if(d.status==="×") tdStatus.className="status-no";

   // 金額
   const tdAmount = document.createElement("td");
   const inputAmount = document.createElement("input");

   inputAmount.type = "number";
   inputAmount.value = d.amount || 0;
   inputAmount.disabled = true;
   inputAmount.classList.add("locked");

   // クリック編集
   inputAmount.onclick = ()=>{
    if(confirm("金額を編集しますか？")){
     inputAmount.disabled = false;
     inputAmount.focus();
    }
   };

   // ダブルクリック即編集
   inputAmount.ondblclick = (e)=>{
    e.stopPropagation();
    inputAmount.disabled = false;
    inputAmount.focus();
   };

   inputAmount.onchange = ()=>{
    db.ref("companies/"+id+"/years/"+y+"/amount")
    .set(Number(inputAmount.value));

    inputAmount.disabled = true;
   };

   tdAmount.appendChild(inputAmount);

   // 備考
   const tdNotes = document.createElement("td");

   const wrapper = document.createElement("div");
   wrapper.className = "note-scroll";

   const inputNotes = document.createElement("input");

   inputNotes.type = "text";
   inputNotes.value = d.notes || "";
   inputNotes.disabled = true;
   inputNotes.classList.add("locked");
   inputNotes.style.minWidth = "400px";

   // クリック編集
   inputNotes.onclick = ()=>{
    if(confirm("備考を編集しますか？")){
     inputNotes.disabled = false;
     inputNotes.focus();
    }
   };

   // ダブルクリック即編集
   inputNotes.ondblclick = (e)=>{
    e.stopPropagation();
    inputNotes.disabled = false;
    inputNotes.focus();
   };

   inputNotes.onchange = ()=>{
    db.ref("companies/"+id+"/years/"+y+"/notes")
    .set(inputNotes.value);

    inputNotes.disabled = true;
   };

   wrapper.appendChild(inputNotes);
   tdNotes.appendChild(wrapper);

   // 削除
   const tdDelete = document.createElement("td");
   const btn = document.createElement("button");
   btn.textContent = "削除";
   btn.className = "small-btn";

   btn.onclick = (e)=>{
    e.stopPropagation();
    deleteYear(y);
   };

   tdDelete.appendChild(btn);

   tr.appendChild(tdYear);
   tr.appendChild(tdStatus);
   tr.appendChild(tdAmount);
   tr.appendChild(tdNotes);
   tr.appendChild(tdDelete);

   table.appendChild(tr);

  });

 });

}

// =========================
// 状態変更
// =========================
function changeStatus(year){

 db.ref("companies/"+id+"/years/"+year).once("value", snap=>{

  const d = snap.val() || {};
  const now = d.status || "";

  let next = "";
  if(now==="") next="○";
  else if(now==="○") next="△";
  else if(now==="△") next="×";
  else next="";

  db.ref("companies/"+id+"/years/"+year+"/status").set(next);

  load();

 });

}

// =========================
// 年度追加
// =========================
function addYear(){

 const y = prompt("年度");
 if(!y) return;

 db.ref("companies/"+id+"/years/"+y).set({
  status:"",
  amount:0,
  notes:""
 });

 load();
}

// =========================
// 削除
// =========================
function deleteYear(y){

 if(!confirm(y+"年削除？")) return;

 db.ref("companies/"+id+"/years/"+y).remove()
 .then(()=>load());
}

// =========================
// 編集
// =========================
function editCompany(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();

  const name = prompt("企業名", c.name || "");
  const address = prompt("住所", c.address || "");
  const email = prompt("メール", c.email || "");
  const phone = prompt("電話", c.phone || "");
  const map = prompt("GoogleMap", c.map || "");
  const notes = prompt("備考", c.notes || "");

  db.ref("companies/"+id).update({
   name,address,email,phone,map,notes
  });

  load();

 });

}

// =========================
// 削除
// =========================
function deleteCompany(){

 if(!confirm("削除する？")) return;

 db.ref("companies/"+id).remove()
 .then(()=>{
  location.href="index.html";
 });

}

load();

</script>

</body>
</html>
