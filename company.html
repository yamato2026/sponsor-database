<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
font-family:sans-serif;
margin:40px;
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid black;
padding:10px;
text-align:center;
}

button{
margin:2px;
}
</style>

</head>

<body>

<h1 id="name"></h1>
<p>
訪問状況：
<span id="visitedStatus"></span>
<button onclick="setVisited(true)">訪問済み</button>
<button onclick="setVisited(false)">未訪問</button>
</p>
<button onclick="editCompany()">編集</button>
<button onclick="deleteCompany()">削除</button>

<p><b>住所：</b><span id="address"></span></p>
<p><b>メール：</b><span id="email"></span></p>
<p><b>電話：</b><span id="phone"></span></p>

<a id="maplink" target="_blank">
<img id="map" width="300">
</a>

<h2>協賛履歴</h2>

<table>

<tr>
<th>年度</th>
<th>状況</th>
<th>変更</th>
</tr>

<tr>
<td>2025</td>
<td id="y2025"></td>
<td>
<button onclick="setYear('2025','○')">○</button>
<button onclick="setYear('2025','△')">△</button>
<button onclick="setYear('2025','×')">×</button>
</td>
</tr>

<tr>
<td>2026</td>
<td id="y2026"></td>
<td>
<button onclick="setYear('2026','○')">○</button>
<button onclick="setYear('2026','△')">△</button>
<button onclick="setYear('2026','×')">×</button>
</td>
</tr>

<tr>
<td>2027</td>
<td id="y2027"></td>
<td>
<button onclick="setYear('2027','○')">○</button>
<button onclick="setYear('2027','△')">△</button>
<button onclick="setYear('2027','×')">×</button>
</td>
</tr>

</table>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
authDomain: "teienn-kyousan.firebaseapp.com",
databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "teienn-kyousan",
storageBucket: "teienn-kyousan.firebasestorage.app",
messagingSenderId: "567202456256",
appId: "1:567202456256:web:156b0587040cbbfaa1c325"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params=new URLSearchParams(location.search);
const id=params.get("id");

db.ref("companies/"+id).on("value", snapshot => {

const company=snapshot.val();

document.getElementById("name").textContent=company.name;
document.getElementById("address").textContent=company.address || "";
document.getElementById("email").textContent=company.email;
document.getElementById("phone").textContent=company.phone;

if(company.map){
document.getElementById("map").src=company.map;
document.getElementById("maplink").href=company.map;
}

const years=company.years||{};
document.getElementById("visitedStatus").textContent =
company.visited ? "訪問済み" : "未訪問";

document.getElementById("y2025").textContent=years["2025"]||"";
document.getElementById("y2026").textContent=years["2026"]||"";
document.getElementById("y2027").textContent=years["2027"]||"";

});

function setYear(year,status){

db.ref("companies/"+id+"/years/"+year).set(status);

}

function editCompany(){

const name = prompt("企業名", document.getElementById("name").textContent);
const address = prompt("住所", document.getElementById("address").textContent);
const email = prompt("メール", document.getElementById("email").textContent);
const phone = prompt("電話", document.getElementById("phone").textContent);
const map = prompt("GoogleMap URL", document.getElementById("maplink").href);

db.ref("companies/"+id).update({
name:name,
address:address,
email:email,
phone:phone,
map:map
});

alert("更新しました");

}

function deleteCompany(){

if(!confirm("この企業を削除しますか？")) return;

db.ref("companies/"+id).remove();

alert("削除しました");

location.href="index.html";

}

function setVisited(status){

db.ref("companies/"+id+"/visited").set(status);

}

</script>

</body>
</html>
