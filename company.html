<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企業情報</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== カラー ===== */
:root{
 --main:#7a1f2b;
 --accent:#f4a62a;
}

/* ===== 全体 ===== */
body{
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 margin:0;
 background:#f4f6f9;
}

.container{
 max-width:1000px;
 margin:auto;
 padding:20px;
}

/* ===== タイトル ===== */
h1{
 color:var(--main);
}

/* ===== ボタン ===== */
.top-bar{
 display:flex;
 flex-wrap:wrap;
 gap:10px;
 margin-bottom:20px;
}

button{
 padding:10px 15px;
 border:none;
 border-radius:8px;
 background:var(--main);
 color:white;
 cursor:pointer;
}

button:hover{
 background:#5c1620;
}

.delete-btn{
 background:#e74c3c;
}

/* ===== カード ===== */
.card{
 background:white;
 padding:20px;
 border-radius:12px;
 box-shadow:0 2px 8px rgba(0,0,0,0.08);
 margin-bottom:20px;
 border-left:6px solid var(--accent);
}

/* ===== テーブルラップ（←重要） ===== */
.table-wrap{
 width:100%;
 overflow-x:auto;
 -webkit-overflow-scrolling:touch;
}

/* ===== テーブル ===== */
table{
 width:100%;
 border-collapse:collapse;
 min-width:700px; /* ←これがポイント */
}

th{
 background:var(--main);
 color:white;
 padding:10px;
}

td{
 padding:10px;
 border-bottom:1px solid #eee;
}

tr:hover{
 background:#f1f5ff;
}

/* ===== 入力 ===== */
input,select{
 width:100%;
 padding:6px;
 border:1px solid #ccc;
 border-radius:6px;
}

/* ===== 横スクロール備考 ===== */
.note-scroll{
 max-width:200px;
 overflow-x:auto;
 white-space:nowrap;
}

/* ===== 小ボタン ===== */
.small-btn{
 background:#e74c3c;
 color:white;
 padding:5px 8px;
 border:none;
 border-radius:5px;
}

/* ===== スマホ ===== */
@media (max-width:600px){

 th, td{
  font-size:12px;
  padding:8px;
 }

 input{
  font-size:12px;
 }

 .top-bar button{
  width:100%;
 }

}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">
<button onclick="location.href='index.html'">
 <i class="fa-solid fa-arrow-left"></i> 戻る
</button>

<button onclick="editCompany()">
 <i class="fa-solid fa-pen"></i> 編集
</button>

<button onclick="deleteCompany()" class="delete-btn">
 <i class="fa-solid fa-trash"></i> 削除
</button>

<button onclick="addYear()">
 <i class="fa-solid fa-plus"></i> 年度追加
</button>
</div>

<div class="card">
<h1><i class="fa-solid fa-building"></i> <span id="name"></span></h1>

<p><b>住所：</b><span id="address"></span></p>
<p><b>メール：</b><span id="email"></span></p>
<p><b>電話：</b><span id="phone"></span></p>
<p><b>地図：</b><a id="maplink" target="_blank">開く</a></p>
</div>

<div class="card">
<h2>協賛履歴</h2>

<!-- ★ここが重要 -->
<div class="table-wrap">

<table>
<thead>
<tr>
<th>年度</th>
<th>状況</th>
<th>金額</th>
<th>備考</th>
<th>編集</th>
<th>削除</th>
</tr>
</thead>

<tbody id="yearTable"></tbody>
</table>

</div>
</div>

<div class="card">
<h2>備考（企業全体）</h2>
<p id="notes"></p>
</div>

</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if(!firebase.apps.length){
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const id = new URLSearchParams(location.search).get("id");

function load(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();
  if(!c) return;

  document.getElementById("name").textContent = c.name || "";
  document.getElementById("address").textContent = c.address || "";
  document.getElementById("email").textContent = c.email || "";
  document.getElementById("phone").textContent = c.phone || "";
  document.getElementById("notes").textContent = c.notes || "";

  document.getElementById("maplink").href =
   (c.map||"").startsWith("http") ? c.map : "#";

  const years = c.years || {};
  const table = document.getElementById("yearTable");
  table.innerHTML = "";

  Object.keys(years).sort().forEach(y=>{

   const d = years[y] || {status:"",amount:0,notes:""};
   let locked = true;

   const tr = document.createElement("tr");

   const tdYear = document.createElement("td");
   tdYear.textContent = y;

   const tdStatus = document.createElement("td");
   const select = document.createElement("select");

   ["","〇","△","×"].forEach(v=>{
    const opt = document.createElement("option");
    opt.value = v==="〇" ? "○" : v;
    opt.textContent = v;
    select.appendChild(opt);
   });

   select.value = d.status || "";
   select.disabled = true;

   select.onchange = ()=>{
    db.ref("companies/"+id+"/years/"+y+"/status")
    .set(select.value);
   };

   tdStatus.appendChild(select);

   const tdAmount = document.createElement("td");
   const inputA = document.createElement("input");
   inputA.type="number";
   inputA.value = d.amount || 0;
   inputA.disabled = true;

   inputA.onchange = ()=>{
    db.ref("companies/"+id+"/years/"+y+"/amount")
    .set(Number(inputA.value));
   };

   tdAmount.appendChild(inputA);

   const tdNotes = document.createElement("td");
   const wrap = document.createElement("div");
   wrap.className="note-scroll";

   const inputN = document.createElement("input");
   inputN.value = d.notes || "";
   inputN.style.minWidth="300px";
   inputN.disabled = true;

   inputN.onchange = ()=>{
    db.ref("companies/"+id+"/years/"+y+"/notes")
    .set(inputN.value);
   };

   wrap.appendChild(inputN);
   tdNotes.appendChild(wrap);

   const tdEdit = document.createElement("td");
   const editBtn = document.createElement("button");
   editBtn.textContent="編集";

   editBtn.onclick=()=>{
    locked = !locked;
    select.disabled = locked;
    inputA.disabled = locked;
    inputN.disabled = locked;
    editBtn.textContent = locked ? "編集" : "完了";
   };

   tdEdit.appendChild(editBtn);

   const tdDel = document.createElement("td");
   const delBtn = document.createElement("button");
   delBtn.textContent="削除";
   delBtn.className="small-btn";

   delBtn.onclick=()=>{
    if(!confirm("削除する？")) return;
    db.ref("companies/"+id+"/years/"+y).remove().then(load);
   };

   tdDel.appendChild(delBtn);

   tr.appendChild(tdYear);
   tr.appendChild(tdStatus);
   tr.appendChild(tdAmount);
   tr.appendChild(tdNotes);
   tr.appendChild(tdEdit);
   tr.appendChild(tdDel);

   table.appendChild(tr);

  });

 });

}

function addYear(){
 const y = prompt("年度");
 if(!y) return;

 db.ref("companies/"+id+"/years/"+y).set({
  status:"",
  amount:0,
  notes:""
 });

 load();
}

function editCompany(){
 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();

  db.ref("companies/"+id).update({
   name:prompt("企業名",c.name),
   address:prompt("住所",c.address),
   email:prompt("メール",c.email),
   phone:prompt("電話",c.phone),
   map:prompt("GoogleMap",c.map),
   notes:prompt("備考",c.notes)
  });

  load();
 });
}

function deleteCompany(){
 if(!confirm("削除する？")) return;

 db.ref("companies/"+id).remove()
 .then(()=>location.href="index.html");
}

load();

</script>

</body>
</html>
